[pytest]
# Suppress deprecation warnings from supabase-py internals and pytest-asyncio
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning

# pytest-asyncio config
asyncio_mode = auto
asyncio_default_fixture_loop_scope = function

# Test discovery
testpaths = tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Output format
addopts = -v --tb=short
